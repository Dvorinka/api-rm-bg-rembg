version: '3.8'

services:
  rm-bg-rembg-api:
    build: .
    ports:
      - "30019:30019"
    environment:
      - PORT=30019
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - RMBG_API_KEY=${RMBG_API_KEY:-dev-rmbg-key}
      - RAPIDAPI_PROXY_SECRET=${RAPIDAPI_PROXY_SECRET:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:30019/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - api-network

networks:
  api-network:
    driver: bridge
