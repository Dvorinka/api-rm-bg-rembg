[phases.setup]
nixPkgs = ["python311", "go", "wget", "curl"]

[phases.build]
cmd = "go build -o go-server cmd/server/main.go"

[start]
cmd = "python python_service/main.py & ./go-server"

[variables]
PORT = "30019"
ENVIRONMENT = "production"
RMBG_API_KEY = "${RMBG_API_KEY}"
PYTHON_SERVICE_HOST = "localhost"
PYTHON_SERVICE_PORT = "30020"
RAPIDAPI_PROXY_SECRET = "${RAPIDAPI_PROXY_SECRET}"
